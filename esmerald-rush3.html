<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Hedgehog: Emerald Rush 3</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#02050a;color:#fff;font-family:Arial,Helvetica,sans-serif}
body{display:grid;place-items:center;overflow:hidden}
.wrap{width:min(1280px,100vw);padding:8px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.title{font-weight:900;font-size:clamp(22px,3vw,36px)}
.title span{color:#4da3ff}
.help{font-size:13px;color:#cbd5e1;text-align:right}
.shell{position:relative;border:2px solid #4da3ff;border-radius:22px;overflow:hidden;background:#000;box-shadow:0 0 50px rgba(77,163,255,.28)}
canvas{display:block;width:100%;height:auto;background:#68d4ff}
.hud{position:absolute;inset:10px 10px auto 10px;display:grid;grid-template-columns:repeat(6,auto);justify-content:space-between;gap:8px;pointer-events:none;font-weight:900;text-shadow:0 2px 4px #000}
.hud div{padding:8px 11px;border-radius:12px;background:rgba(1,8,20,.62);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(5px)}
.emeralds{position:absolute;top:58px;left:50%;transform:translateX(-50%);display:flex;gap:7px;padding:8px 11px;border-radius:999px;background:rgba(1,8,20,.58);border:1px solid rgba(255,255,255,.08)}
.gem{width:22px;height:22px;clip-path:polygon(50% 0,100% 34%,82% 100%,18% 100%,0 34%);filter:grayscale(1) brightness(.38);transition:.25s}
.gem.on{filter:none;transform:scale(1.12)}
.overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(660px,90%);padding:28px;border-radius:24px;text-align:center;background:linear-gradient(180deg,rgba(3,11,25,.96),rgba(8,22,45,.95));border:1px solid rgba(255,255,255,.18);box-shadow:0 24px 80px rgba(0,0,0,.6)}
.overlay h2{margin:0 0 10px;font-size:clamp(36px,7vw,72px);line-height:.92}
.overlay h2 span{color:#4da3ff;text-shadow:0 0 20px rgba(77,163,255,.6)}
.overlay p{color:#dbe6f3;line-height:1.5}
button{border:0;border-radius:999px;padding:13px 28px;font-size:16px;font-weight:900;background:linear-gradient(#7bc0ff,#2f89ff);color:#03101e;cursor:pointer;box-shadow:0 10px 26px rgba(47,137,255,.3)}
#spinMeter{display:none;position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:270px;height:18px;border-radius:999px;background:rgba(0,0,0,.65);border:2px solid white;overflow:hidden}
#spinFill{height:100%;width:0;background:linear-gradient(90deg,#4da3ff,#fff,#ffd91a)}
.mobile{display:none;position:absolute;inset:auto 10px 10px 10px;justify-content:space-between;pointer-events:none}
.group{display:flex;gap:10px;align-items:flex-end}
.touch{pointer-events:auto;width:58px;height:58px;padding:0;border-radius:50%;background:rgba(2,9,20,.7);color:#fff;border:1px solid rgba(255,255,255,.35);font-size:23px;touch-action:none;user-select:none;box-shadow:none}
.jump{width:76px;height:76px;background:rgba(77,163,255,.75);color:#03101e}
@media(max-width:820px),(pointer:coarse){body{overflow:auto}.wrap{padding:3px}.help{display:none}.mobile{display:flex}.hud{font-size:10px}.emeralds{top:50px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title"><span>💎💎💎</span>Emerald Rush 3💎💎💎</div>
    <div class="help">Move A/D or ←/→ · Jump Space · Boost Shift · Spin Dash ↓ + Space</div>
  </div>

  <div class="shell">
    <canvas id="game" width="1220" height="680"></canvas>

    <div class="hud">
      <div>LEVEL: <span id="levelText">1</span></div>
      <div>RINGS: <span id="rings">0</span></div>
      <div>EMERALDS: <span id="emeraldCount">0</span>/7</div>
      <div>ENERGY: <span id="energy">0</span></div>
      <div>SPEED: <span id="speed">0</span></div>
      <div>LIVES: <span id="lives">3</span></div>
    </div>

    <div class="emeralds" id="emeraldBar"></div>

    <div class="overlay" id="overlay">
      <h2><span>EMERALD</span><br>RUSH 3</h2>
      <p>Collect all seven emeralds, unlock Super Form, and defeat the final machine.</p>
      <button id="start">START GAME</button>
    </div>

    <div id="spinMeter"><div id="spinFill"></div></div>

    <div class="mobile">
      <div class="group">
        <button class="touch" data-key="ArrowLeft">◀</button>
        <button class="touch" data-key="ArrowDown">▼</button>
        <button class="touch" data-key="ArrowRight">▶</button>
      </div>
      <div class="group">
        <button class="touch" data-key="ShiftLeft">⚡</button>
        <button class="touch jump" data-key="Space">▲</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("start");
const levelText=document.getElementById("levelText");
const ringsEl=document.getElementById("rings");
const emeraldEl=document.getElementById("emeraldCount");
const energyEl=document.getElementById("energy");
const speedEl=document.getElementById("speed");
const livesEl=document.getElementById("lives");
const emeraldBar=document.getElementById("emeraldBar");
const spinMeter=document.getElementById("spinMeter");
const spinFill=document.getElementById("spinFill");

const GEM_COLORS=["#ff3b30","#ff9500","#ffd60a","#34c759","#32ade6","#5856d6","#ff2d95"];
GEM_COLORS.forEach(c=>{const d=document.createElement("div");d.className="gem";d.style.background=c;emeraldBar.appendChild(d)});

const WORLD=9200,GROUND=540,GRAVITY=.72;
const keys={};
let running=false,camera=0,checkpoint=100,flash=0,shake=0,currentLevel=1;
let particles=[],shots=[],audioCtx=null;

const player={
 x:100,y:430,w:48,h:60,vx:0,vy:0,onGround:false,facing:1,
 rings:0,emeralds:0,lives:3,energy:0,super:false,inv:0,
 anim:0,spin:false,spinDash:0,charging:false,spinBoostTimer:0
};

const levels={
  1:{
    name:"Tropical Velocity",
    platforms:[
      {x:0,y:GROUND,w:WORLD,h:150},
      {x:520,y:440,w:240,h:28},{x:850,y:365,w:230,h:28},{x:1230,y:425,w:250,h:28},
      {x:1650,y:345,w:210,h:28},{x:2050,y:290,w:240,h:28},{x:2470,y:415,w:260,h:28},
      {x:2940,y:335,w:220,h:28},{x:3370,y:395,w:310,h:28},{x:3940,y:305,w:230,h:28},
      {x:4430,y:405,w:260,h:28},{x:4950,y:330,w:230,h:28},{x:5500,y:390,w:280,h:28},
      {x:6070,y:310,w:230,h:28},{x:6610,y:400,w:260,h:28},{x:7140,y:330,w:240,h:28},
      {x:7700,y:390,w:280,h:28},{x:8300,y:330,w:240,h:28}
    ],
    rings:[[230,480,7],[550,390,5],[880,315,5],[1260,375,5],[1680,295,4],[2080,235,5],[2500,365,5],[2960,280,5],[3400,345,6],[3970,255,5],[4460,355,5],[4980,280,5],[5530,340,6],[6100,260,5],[6640,350,6],[7170,280,5],[7740,340,6],[8340,280,5],[8750,480,8]],
    emeralds:[
      {x:970,y:305,color:0},{x:1760,y:280,color:1},{x:2180,y:220,color:2},
      {x:3480,y:325,color:3}
    ],
    enemies:[
      {x:1530,y:GROUND-42,type:0},{x:2820,y:GROUND-42,type:1},{x:4210,y:GROUND-42,type:0},
      {x:5200,y:GROUND-42,type:1},{x:6350,y:GROUND-42,type:0},{x:7500,y:GROUND-42,type:1}
    ],
    exitX:8900
  },
  2:{
    name:"Neon Robot City",
    platforms:[
      {x:0,y:GROUND,w:WORLD,h:150},
      {x:420,y:430,w:220,h:28},{x:760,y:350,w:220,h:28},{x:1140,y:410,w:250,h:28},
      {x:1530,y:320,w:220,h:28},{x:1940,y:260,w:250,h:28},{x:2380,y:405,w:250,h:28},
      {x:2830,y:310,w:220,h:28},{x:3260,y:380,w:300,h:28},{x:3800,y:290,w:250,h:28},
      {x:4300,y:400,w:250,h:28},{x:4810,y:315,w:240,h:28},{x:5330,y:390,w:270,h:28},
      {x:5860,y:295,w:230,h:28},{x:6350,y:390,w:250,h:28},{x:6880,y:315,w:240,h:28},
      {x:7420,y:385,w:270,h:28},{x:8000,y:310,w:260,h:28}
    ],
    rings:[[180,480,6],[450,380,5],[790,300,5],[1170,360,5],[1560,270,5],[1970,210,5],[2410,355,5],[2860,260,5],[3300,330,6],[3830,240,5],[4330,350,5],[4840,265,5],[5360,340,6],[5890,245,5],[6380,340,6],[6910,265,5],[7450,335,6],[8030,260,5],[8600,480,9]],
    emeralds:[
      {x:1700,y:245,color:4},{x:4900,y:240,color:5},{x:7000,y:240,color:6}
    ],
    enemies:[
      {x:1350,y:GROUND-42,type:2},{x:2600,y:GROUND-42,type:3},{x:3650,y:GROUND-42,type:2},
      {x:4550,y:GROUND-42,type:3},{x:5700,y:GROUND-42,type:2},{x:6800,y:GROUND-42,type:3},
      {x:7900,y:GROUND-42,type:2}
    ],
    exitX:8600
  },
  3:{
    name:"Magma Ruins",
    platforms:[
      {x:0,y:GROUND,w:WORLD,h:150},
      {x:360,y:445,w:220,h:28},{x:700,y:365,w:210,h:28},{x:1040,y:285,w:220,h:28},
      {x:1430,y:405,w:260,h:28},{x:1840,y:330,w:220,h:28},{x:2220,y:250,w:240,h:28},
      {x:2670,y:390,w:250,h:28},{x:3090,y:305,w:220,h:28},{x:3500,y:225,w:250,h:28},
      {x:3970,y:385,w:270,h:28},{x:4420,y:300,w:230,h:28},{x:4840,y:220,w:250,h:28},
      {x:5310,y:385,w:270,h:28},{x:5770,y:300,w:230,h:28},{x:6200,y:220,w:250,h:28},
      {x:6670,y:380,w:280,h:28},{x:7150,y:295,w:230,h:28},{x:7570,y:215,w:260,h:28},
      {x:8070,y:360,w:290,h:28}
    ],
    rings:[[160,480,7],[390,395,5],[730,315,5],[1070,235,5],[1460,355,6],[1870,280,5],
      [2250,200,5],[2700,340,6],[3120,255,5],[3530,175,6],[4000,335,6],[4450,250,5],
      [4870,170,6],[5340,335,6],[5800,250,5],[6230,170,6],[6700,330,7],[7180,245,5],
      [7600,165,6],[8110,310,8],[8600,480,10]],
    emeralds:[],
    enemies:[
      {x:1250,y:GROUND-42,type:3},{x:2050,y:GROUND-42,type:2},{x:2900,y:GROUND-42,type:3},
      {x:3820,y:GROUND-42,type:2},{x:4700,y:GROUND-42,type:3},{x:5600,y:GROUND-42,type:2},
      {x:6500,y:GROUND-42,type:3},{x:7480,y:GROUND-42,type:2}
    ],
    exitX:8300
  }
};

let platforms=[],ringItems=[],emeralds=[],enemies=[];
const boss={x:8750,y:320,w:210,h:160,hp:18,maxHp:18,vx:2.6,min:8420,max:9000,active:false,alive:true,shotTimer:0};

function beep(freq=440,dur=.08,type="square",vol=.05){
 try{
   if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
   const o=audioCtx.createOscillator(),g=audioCtx.createGain();
   o.type=type;o.frequency.value=freq;g.gain.value=vol;
   o.connect(g);g.connect(audioCtx.destination);o.start();
   g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
   o.stop(audioCtx.currentTime+dur);
 }catch(e){}
}

function buildLevel(n){
 currentLevel=n;
 const data=levels[n];
 platforms=data.platforms.map(p=>({...p}));
 ringItems=[];
 data.rings.forEach(a=>{
   for(let i=0;i<a[2];i++)ringItems.push({x:a[0]+i*42,y:a[1],got:false,p:Math.random()*6.28});
 });
 emeralds=data.emeralds.map(e=>({...e,got:false}));
 enemies=data.enemies.map((e,i)=>({
   ...e,w:52,h:44,vx:i%2? -1.5:1.5,min:e.x-65,max:e.x+65,alive:true
 }));
 boss.active=false;boss.alive=true;boss.hp=boss.maxHp;boss.x=8750;shots=[];
 checkpoint=100;player.x=100;player.y=420;player.vx=0;player.vy=0;camera=0;
 levelText.textContent=n;
 syncHUD();
}

function syncHUD(){
 ringsEl.textContent=player.rings;emeraldEl.textContent=player.emeralds;
 energyEl.textContent=Math.floor(player.energy);speedEl.textContent=Math.round(Math.abs(player.vx)*10);
 livesEl.textContent=player.lives;
 [...emeraldBar.children].forEach((g,i)=>g.classList.toggle("on",i<player.emeralds));
}

function resetGame(){
 player.rings=0;player.emeralds=0;player.lives=3;player.energy=0;player.super=false;
 player.inv=90;player.spin=false;player.spinDash=0;player.charging=false;player.spinBoostTimer=0;
 particles=[];buildLevel(1);
 spinMeter.style.display="none";spinFill.style.width="0%";
}

function jump(){
 const down=keys.ArrowDown||keys.KeyS||keys.s;
 if(player.super){
   player.vy=-8.5;beep(700,.05,"sine",.03);return;
 }
 if(player.onGround&&down){
   player.charging=true;player.spin=true;
   player.spinDash=Math.min(20,Math.max(7,player.spinDash+4));
   spinMeter.style.display="block";
   spinFill.style.width=(player.spinDash/20*100)+"%";
   addParticles(player.x+24,player.y+48,"#67b7ff",8,3);
   beep(170+player.spinDash*22,.06,"sawtooth",.03);
   return;
 }
 if(player.onGround){
   player.vy=-15.2;player.onGround=false;player.spin=true;
   beep(520,.07,"square",.035);
 }
}

function launchSpinDash(){
 if(!player.charging||player.spinDash<=0)return;

 const charge=player.spinDash/20;
 const launchSpeed=18+charge*18;

 player.vx=player.facing*launchSpeed;
 player.vy=-.35;
 player.spin=true;
 player.onGround=false;
 player.spinBoostTimer=55+Math.round(charge*45);

 player.charging=false;
 player.spinDash=0;

 spinMeter.style.display="none";
 spinFill.style.width="0%";

 addParticles(player.x+24,player.y+50,"#9bd0ff",28,9);
 shake=8;
 beep(95,.18,"sawtooth",.075);
}

addEventListener("keydown",e=>{
 keys[e.code]=true;keys[e.key]=true;
 if(e.code==="Space")jump();
 if(["ArrowLeft","ArrowRight","ArrowDown","Space"].includes(e.code))e.preventDefault();
});
addEventListener("keyup",e=>{
 keys[e.code]=false;keys[e.key]=false;
 if(e.code==="ArrowDown"||e.code==="KeyS"||e.key==="ArrowDown"||e.key==="s")launchSpinDash();
});

document.querySelectorAll(".touch").forEach(btn=>{
 const k=btn.dataset.key;
 const down=e=>{e.preventDefault();keys[k]=true;if(k==="Space")jump()};
 const up=e=>{e.preventDefault();keys[k]=false;if(k==="ArrowDown")launchSpinDash()};
 btn.addEventListener("pointerdown",down);btn.addEventListener("pointerup",up);
 btn.addEventListener("pointercancel",up);btn.addEventListener("pointerleave",up);
});

startBtn.onclick=()=>{
 overlay.style.display="none";running=true;resetGame();requestAnimationFrame(loop);
};

function addParticles(x,y,color,count=12,speed=4){
 for(let i=0;i<count;i++)particles.push({
   x,y,vx:(Math.random()-.5)*speed*2,vy:(Math.random()-.5)*speed*2,
   life:30+Math.random()*25,color,size:2+Math.random()*4
 });
}

function transform(){
 if(player.super)return;
 player.super=true;player.energy=100;player.inv=999999;flash=40;shake=14;
 addParticles(player.x+24,player.y+28,"#fff34c",60,9);
 beep(900,.3,"sawtooth",.07);
}

function transitionLevel(nextLevel){
 running=false;
 const names={2:"NEON ROBOT CITY",3:"MAGMA RUINS"};
 const descriptions={
   2:"The last three emeralds are hidden inside the machine city.",
   3:"All seven emeralds are yours. Cross the molten ruins and destroy the final machine."
 };
 overlay.innerHTML=`<h2><span>LEVEL ${nextLevel}</span></h2><p>${names[nextLevel]}</p><p>${descriptions[nextLevel]}</p><button id="continue">CONTINUE</button>`;
 overlay.style.display="block";
 document.getElementById("continue").onclick=()=>{
   overlay.style.display="none";
   buildLevel(nextLevel);
   running=true;
   requestAnimationFrame(loop);
 };
}

function endScreen(title,text){
 running=false;
 overlay.innerHTML=`<h2>${title}</h2><p>${text}</p><button id="again">PLAY AGAIN</button>`;
 overlay.style.display="block";
 document.getElementById("again").onclick=()=>{
   overlay.style.display="none";running=true;resetGame();requestAnimationFrame(loop);
 };
}

function hurt(){
 if(player.super||player.inv>0)return;
 shake=10;
 if(player.rings>0){
   player.rings=Math.max(0,player.rings-10);
   player.vy=-10;player.vx=-player.facing*6;player.inv=120;
   addParticles(player.x,player.y,"#ffd21e",20,7);
 }else{
   player.lives--;
   if(player.lives<=0){endScreen("GAME OVER","Try again and collect more rings.");return}
   player.x=checkpoint;player.y=420;player.vx=0;player.vy=0;player.inv=90;
 }
 syncHUD();
}

function update(){
 const left=keys.ArrowLeft||keys.KeyA||keys.a;
 const right=keys.ArrowRight||keys.KeyD||keys.d;
 const boost=keys.ShiftLeft||keys.ShiftRight||keys.Shift;
 const fly=keys.Space;

 if(!player.charging&&left){player.vx-=player.super?.76:.62;player.facing=-1}
 if(!player.charging&&right){player.vx+=player.super?.76:.62;player.facing=1}
 if(player.charging)player.vx*=.75;
 if(!left&&!right&&!player.spin)player.vx*=player.super?.93:.86;
 if(player.spinBoostTimer>0)player.vx*=.997;

 if(player.spinBoostTimer>0){
   player.spinBoostTimer--;
   player.spin=true;

   if(left&&player.facing<0)player.vx-=.08;
   if(right&&player.facing>0)player.vx+=.08;

   player.vx*=.994;

   if(Math.abs(player.vx)<11){
     player.spinBoostTimer=0;
   }
 }

 const normalMax=player.super?(boost?20:15):(boost?14.8:10.2);
 const max=player.spinBoostTimer>0?38:normalMax;
 player.vx=Math.max(-max,Math.min(max,player.vx));
 if(Math.abs(player.vx)<.04)player.vx=0;

 const oldBottom=player.y+player.h;
 if(player.super){
   player.vy+=fly?-.58:.24;
   player.vy=Math.max(-9.5,Math.min(8.5,player.vy));
   player.energy-=.04;
   if(player.energy<=0){player.energy=0;player.super=false;player.inv=120}
 }else player.vy+=GRAVITY;

 player.x+=player.vx;player.y+=player.vy;
 player.x=Math.max(0,Math.min(WORLD-player.w,player.x));
 player.onGround=false;player.anim+=Math.abs(player.vx)*.14;

 for(const p of platforms){
   const hit=player.x+player.w>p.x&&player.x<p.x+p.w&&player.y+player.h>=p.y&&player.y<p.y+p.h;
   if(hit&&oldBottom<=p.y+5&&player.vy>=0){
     player.y=p.y-player.h;player.vy=0;player.onGround=true;
     if(!player.charging&&player.spinBoostTimer<=0)player.spin=false;
   }
 }

 for(const r of ringItems){
   if(r.got)continue;
   const dx=player.x+player.w/2-r.x,dy=player.y+player.h/2-r.y;
   if(dx*dx+dy*dy<36*36){
     r.got=true;player.rings++;
     if(player.super)player.energy=Math.min(100,player.energy+2);
     addParticles(r.x,r.y,"#ffd21e",8,3);
   }
 }

 for(const e of emeralds){
   if(e.got)continue;
   const dx=player.x+player.w/2-e.x,dy=player.y+player.h/2-e.y;
   if(dx*dx+dy*dy<44*44){
     e.got=true;player.emeralds++;flash=20;shake=7;
     addParticles(e.x,e.y,GEM_COLORS[e.color],28,7);
     if(player.emeralds===7)transform();
   }
 }

 for(const e of enemies){
   if(!e.alive)continue;
   e.x+=e.vx;if(e.x<e.min||e.x>e.max)e.vx*=-1;
   if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y<e.y+e.h&&player.y+player.h>e.y){
     if(player.super||player.spin||player.vy>2){
       e.alive=false;player.vy=-9;
       addParticles(e.x,e.y,e.type>=2?"#56f0ff":"#ff4b35",24,7);
     }else hurt();
   }
 }

 if(currentLevel===1&&player.x>levels[1].exitX){
   transitionLevel(2);
   return;
 }

 if(currentLevel===2&&player.x>levels[2].exitX){
   transitionLevel(3);
   return;
 }

 if(currentLevel===3&&player.x>8300&&!boss.active)boss.active=true;

 if(boss.active&&boss.alive){
   boss.x+=boss.vx;if(boss.x<boss.min||boss.x>boss.max)boss.vx*=-1;
   boss.shotTimer--;
   if(boss.shotTimer<=0){
     shots.push({x:boss.x,y:boss.y+75,vx:-6.4,vy:(Math.random()-.5)*3,w:20,h:20});
     boss.shotTimer=44;
   }
   if(player.x<boss.x+boss.w&&player.x+player.w>boss.x&&player.y<boss.y+boss.h&&player.y+player.h>boss.y){
     if(player.super||player.spin){
       boss.hp--;player.vx=-player.facing*9;player.vy=-7;flash=8;shake=12;
       addParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ff5b39",30,8);
       if(boss.hp<=0){
         boss.alive=false;
         addParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ffd43b",100,12);
         setTimeout(()=>endScreen("<span>YOU WON!</span>","All three levels completed and the final robot was destroyed!"),650);
       }
     }else hurt();
   }
 }

 for(let i=shots.length-1;i>=0;i--){
   const s=shots[i];s.x+=s.vx;s.y+=s.vy;
   if(s.x<camera-100||s.y>720){shots.splice(i,1);continue}
   if(player.x<s.x+s.w&&player.x+player.w>s.x&&player.y<s.y+s.h&&player.y+player.h>s.y){
     if(player.super||player.spin){addParticles(s.x,s.y,"#ffcc33",13,4);shots.splice(i,1)}
     else{shots.splice(i,1);hurt()}
   }
 }

 for(let i=particles.length-1;i>=0;i--){
   const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;
   if(p.life<=0)particles.splice(i,1);
 }

 if(player.y>780)hurt();

 camera+=(player.x-canvas.width*.35-camera)*.1;
 camera=Math.max(0,Math.min(WORLD-canvas.width,camera));
 if(flash>0)flash--;if(shake>0)shake*=.86;
 syncHUD();
}

function hill(x,base,w,h,color){
 ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x,base);
 ctx.quadraticCurveTo(x+w/2,base-h,x+w,base);
 ctx.lineTo(x+w,680);ctx.lineTo(x,680);ctx.fill();
}

function palm(x,y,s=1){
 ctx.save();ctx.translate(x,y);ctx.scale(s,s);
 ctx.strokeStyle="#754820";ctx.lineWidth=8;
 ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-7,-45,3,-92);ctx.stroke();
 ctx.fillStyle="#159852";
 for(let i=0;i<7;i++){
   ctx.save();ctx.translate(3,-92);ctx.rotate((i-3)*.43);
   ctx.beginPath();ctx.ellipse(28,0,31,8,0,0,7);ctx.fill();ctx.restore();
 }
 ctx.restore();
}

function drawTropicalBackground(){
 const g=ctx.createLinearGradient(0,0,0,680);
 if(player.super){g.addColorStop(0,"#251c72");g.addColorStop(.48,"#ff7648");g.addColorStop(1,"#ffef9a")}
 else{g.addColorStop(0,"#4fc8ff");g.addColorStop(.62,"#dff8ff");g.addColorStop(1,"#fff")}
 ctx.fillStyle=g;ctx.fillRect(0,0,1220,680);

 ctx.fillStyle="rgba(255,255,255,.82)";
 for(let i=0;i<10;i++){
   const x=((i*260-camera*.13)%1500+1500)%1500-120,y=65+(i%3)*56;
   ctx.beginPath();ctx.arc(x,y,27,0,7);ctx.arc(x+35,y-9,40,0,7);ctx.arc(x+72,y,27,0,7);ctx.fill();
 }
 for(let i=0;i<8;i++)hill(i*540-(camera*.22%540)-140,525,450,230,player.super?"#ad6556":"#72d99a");
 for(let i=0;i<11;i++)hill(i*400-(camera*.4%400)-110,545,340,165,player.super?"#7a416c":"#2eb765");
 for(let i=0;i<9;i++)palm(i*340-(camera*.58%340)+35,520,.85+(i%2)*.15);
 ctx.fillStyle="rgba(38,165,220,.58)";ctx.fillRect(0,570,1220,110);
}

function drawCityBackground(){
 const g=ctx.createLinearGradient(0,0,0,680);
 g.addColorStop(0,player.super?"#2d145e":"#090d2a");
 g.addColorStop(.55,player.super?"#7f206e":"#171d4a");
 g.addColorStop(1,"#08141f");
 ctx.fillStyle=g;ctx.fillRect(0,0,1220,680);

 // Stars and neon haze
 for(let i=0;i<80;i++){
   const x=(i*149-camera*.04)%1300,y=(i*67)%360;
   ctx.fillStyle=i%3===0?"#56f0ff":"rgba(255,255,255,.6)";
   ctx.fillRect(x,y,2,2);
 }
 ctx.fillStyle="rgba(72,26,120,.22)";ctx.fillRect(0,180,1220,330);

 // Back skyline
 for(let i=0;i<18;i++){
   const x=i*95-(camera*.18%95),h=130+(i%5)*45;
   ctx.fillStyle=i%2?"#11183d":"#161f4e";
   ctx.fillRect(x,520-h,78,h);
   for(let y=520-h+18;y<510;y+=24){
     ctx.fillStyle=(i+y)%3===0?"#ff3df2":"#37e7ff";
     ctx.fillRect(x+12,y,8,10);ctx.fillRect(x+34,y,8,10);ctx.fillRect(x+56,y,8,10);
   }
 }

 // Foreground pipes
 ctx.strokeStyle="#26344d";ctx.lineWidth=18;
 for(let i=0;i<8;i++){
   const x=i*210-(camera*.55%210);
   ctx.beginPath();ctx.moveTo(x,520);ctx.lineTo(x,420);ctx.lineTo(x+90,420);ctx.stroke();
   ctx.strokeStyle="#37e7ff";ctx.lineWidth=3;
   ctx.beginPath();ctx.moveTo(x,520);ctx.lineTo(x,420);ctx.lineTo(x+90,420);ctx.stroke();
   ctx.strokeStyle="#26344d";ctx.lineWidth=18;
 }
}

function drawFortressBackground(){
 const g=ctx.createLinearGradient(0,0,0,680);
 g.addColorStop(0,player.super?"#40103f":"#21070c");
 g.addColorStop(.45,player.super?"#b13534":"#5e1514");
 g.addColorStop(1,"#120707");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,1220,680);

 // Ash and sparks
 for(let i=0;i<95;i++){
   const x=((i*137-camera*.08)%1350+1350)%1350;
   const y=(i*83+performance.now()*.035)%560;
   ctx.fillStyle=i%4===0?"#ffd25a":"rgba(255,145,60,.55)";
   ctx.fillRect(x,y,2+(i%2),2+(i%3===0));
 }

 // Distant volcanoes
 for(let i=0;i<7;i++){
   const x=i*310-(camera*.16%310)-120;
   const h=180+(i%3)*70;
   ctx.fillStyle=i%2?"#321014":"#461418";
   ctx.beginPath();
   ctx.moveTo(x,535);
   ctx.lineTo(x+135,535-h);
   ctx.lineTo(x+270,535);
   ctx.closePath();
   ctx.fill();

   ctx.strokeStyle="rgba(255,100,35,.65)";
   ctx.lineWidth=5;
   ctx.beginPath();
   ctx.moveTo(x+135,535-h);
   ctx.lineTo(x+120,535-h+55);
   ctx.lineTo(x+148,535-h+92);
   ctx.stroke();
 }

 // Ancient ruined towers
 for(let i=0;i<14;i++){
   const x=i*170-(camera*.28%170)-40;
   const h=110+(i%5)*35;

   ctx.fillStyle=i%2?"#342421":"#46302a";
   ctx.fillRect(x,535-h,126,h);

   ctx.fillStyle="#6a4535";
   ctx.fillRect(x,535-h,126,8);

   for(let row=0;row<4;row++){
     ctx.fillStyle=(row+i)%2?"#a84a24":"#71351f";
     ctx.fillRect(x+14,535-h+25+row*24,22,8);
     ctx.fillRect(x+52,535-h+25+row*24,22,8);
     ctx.fillRect(x+90,535-h+25+row*24,22,8);
   }
 }

 // Lava river
 const lava=ctx.createLinearGradient(0,565,0,680);
 lava.addColorStop(0,"#fff06a");
 lava.addColorStop(.14,"#ff9b24");
 lava.addColorStop(.48,"#e93616");
 lava.addColorStop(1,"#6d0808");
 ctx.fillStyle=lava;
 ctx.fillRect(0,570,1220,110);

 ctx.strokeStyle="rgba(255,245,150,.75)";
 ctx.lineWidth=4;
 for(let i=0;i<9;i++){
   const x=((i*180-camera*.6)%1450+1450)%1450-80;
   ctx.beginPath();
   ctx.moveTo(x,590+(i%2)*20);
   ctx.bezierCurveTo(x+40,575,x+90,615,x+145,590);
   ctx.stroke();
 }
}
function drawPlatform(p){
 const x=p.x-camera;
 if(currentLevel===1){
   const grad=ctx.createLinearGradient(x,p.y,x,p.y+p.h);
   grad.addColorStop(0,"#ad6e38");grad.addColorStop(1,"#5b321c");
   ctx.fillStyle=grad;ctx.fillRect(x,p.y,p.w,p.h);
   ctx.fillStyle=player.super?"#ffcc2e":"#28c64a";ctx.fillRect(x,p.y,p.w,13);
   ctx.fillStyle=player.super?"#fff08a":"#8af16d";
   for(let i=0;i<p.w;i+=28)ctx.fillRect(x+i,p.y+13,14,6);
 }else if(currentLevel===2){
   const grad=ctx.createLinearGradient(x,p.y,x,p.y+p.h);
   grad.addColorStop(0,"#536177");grad.addColorStop(1,"#171d2a");
   ctx.fillStyle=grad;ctx.fillRect(x,p.y,p.w,p.h);
   ctx.fillStyle="#25e8ff";ctx.fillRect(x,p.y,p.w,6);
   ctx.fillStyle="#ff3df2";
   for(let i=12;i<p.w;i+=42)ctx.fillRect(x+i,p.y+10,18,4);
 }else{
   const grad=ctx.createLinearGradient(x,p.y,x,p.y+p.h);
   grad.addColorStop(0,"#8d5b3c");
   grad.addColorStop(.25,"#503126");
   grad.addColorStop(1,"#21100f");
   ctx.fillStyle=grad;
   ctx.fillRect(x,p.y,p.w,p.h);

   ctx.fillStyle="#ff7b22";
   ctx.fillRect(x,p.y,p.w,6);

   ctx.fillStyle="#ffcc45";
   for(let i=10;i<p.w;i+=38){
     ctx.fillRect(x+i,p.y+11,16,4);
     ctx.fillRect(x+i+5,p.y+18,6,6);
   }
 }
}

function drawGem(x,y,color,scale=1){
 ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
 ctx.shadowColor=GEM_COLORS[color];ctx.shadowBlur=20;
 const grad=ctx.createLinearGradient(0,-19,0,19);
 grad.addColorStop(0,"#fff");grad.addColorStop(.18,GEM_COLORS[color]);grad.addColorStop(1,"#111");
 ctx.fillStyle=grad;ctx.beginPath();
 ctx.moveTo(0,-19);ctx.lineTo(18,-5);ctx.lineTo(12,19);ctx.lineTo(-12,19);ctx.lineTo(-18,-5);
 ctx.closePath();ctx.fill();ctx.restore();
}

function drawPlayer(){
 const x=player.x-camera,y=player.y;
 if(!player.super&&player.inv>0&&Math.floor(player.inv/6)%2===0)return;
 const run=Math.sin(player.anim)*6;

 ctx.save();ctx.translate(x+24,y+30);if(player.facing<0)ctx.scale(-1,1);
 if(player.super){ctx.shadowColor="#fff43a";ctx.shadowBlur=30}

 if((player.spin||!player.onGround)&&!player.super){
   ctx.rotate(player.anim*.15);
   const grad=ctx.createRadialGradient(-5,-8,3,0,0,25);
   grad.addColorStop(0,"#69b7ff");grad.addColorStop(.5,"#0878ff");grad.addColorStop(1,"#003b88");
   ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,25,0,7);ctx.fill();
   ctx.strokeStyle="#72bdff";ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*1.45);ctx.stroke();
   ctx.restore();return;
 }

 const flying=player.super&&!player.onGround;
 if(flying){ctx.rotate(player.vy*.012);ctx.scale(1.12,.95)}

 const body=ctx.createLinearGradient(-18,-24,18,24);
 if(player.super){body.addColorStop(0,"#fff77d");body.addColorStop(.42,"#ffd91a");body.addColorStop(1,"#d18a00")}
 else{body.addColorStop(0,"#54acff");body.addColorStop(.5,"#0878ff");body.addColorStop(1,"#004599")}
 ctx.fillStyle=body;

 ctx.beginPath();ctx.ellipse(0,0,23,28,0,0,7);ctx.fill();
 ctx.beginPath();ctx.moveTo(-7,-21);ctx.lineTo(-34,-17);ctx.lineTo(-17,-3);ctx.lineTo(-37,2);ctx.lineTo(-15,11);ctx.lineTo(-31,21);ctx.lineTo(-7,20);ctx.fill();
 ctx.fillStyle="#ffd8a8";ctx.beginPath();ctx.ellipse(9,7,13,17,0,0,7);ctx.fill();
 ctx.fillStyle="#fff";ctx.beginPath();ctx.ellipse(9,-11,8,12,0,0,7);ctx.fill();
 ctx.fillStyle="#0d1630";ctx.beginPath();ctx.arc(12,-9,3,0,7);ctx.fill();
 // Ear, brow, nose, and smile details
 ctx.fillStyle=player.super?"#ffd91a":"#0878ff";
 ctx.beginPath();ctx.moveTo(-7,-21);ctx.lineTo(-2,-38);ctx.lineTo(6,-20);ctx.closePath();ctx.fill();
 ctx.fillStyle="#ffd8a8";ctx.beginPath();ctx.moveTo(-3,-23);ctx.lineTo(-1,-32);ctx.lineTo(3,-22);ctx.closePath();ctx.fill();
 ctx.fillStyle="#111827";ctx.beginPath();ctx.arc(21,-2,4,0,7);ctx.fill();
 ctx.strokeStyle="#4a2615";ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(13,6,8,.2,1.35);ctx.stroke();

 ctx.strokeStyle="#fff";ctx.lineWidth=4;
 ctx.beginPath();ctx.moveTo(-7,7);ctx.lineTo(flying?-28:-19,11+run*.18);ctx.stroke();
 ctx.beginPath();ctx.moveTo(4,12);ctx.lineTo(flying?-18:14,19-run*.18);ctx.stroke();

 // Genesis-style shoes with white cuffs, stripe, soles, and visible laces
 const shoe1X=flying?-20:-10,shoe1Y=25+run;
 const shoe2X=flying?-4:13,shoe2Y=25-run;

 ctx.fillStyle="#ffffff";
 ctx.beginPath();ctx.ellipse(shoe1X-2,shoe1Y-5,9,5,0,0,7);ctx.fill();
 ctx.beginPath();ctx.ellipse(shoe2X-2,shoe2Y-5,9,5,0,0,7);ctx.fill();

 ctx.fillStyle="#ed2939";
 ctx.beginPath();ctx.ellipse(shoe1X,shoe1Y,16,7,-.08,0,7);ctx.fill();
 ctx.beginPath();ctx.ellipse(shoe2X,shoe2Y,16,7,-.08,0,7);ctx.fill();

 // White shoe stripe
 ctx.strokeStyle="#ffffff";ctx.lineWidth=3;
 ctx.beginPath();ctx.moveTo(shoe1X-7,shoe1Y-3);ctx.lineTo(shoe1X+6,shoe1Y+1);ctx.stroke();
 ctx.beginPath();ctx.moveTo(shoe2X-7,shoe2Y-3);ctx.lineTo(shoe2X+6,shoe2Y+1);ctx.stroke();

 // White laces
 ctx.lineWidth=1.8;
 for(let i=0;i<3;i++){
   ctx.beginPath();ctx.moveTo(shoe1X-5+i*4,shoe1Y-4);ctx.lineTo(shoe1X-2+i*4,shoe1Y+1);ctx.stroke();
   ctx.beginPath();ctx.moveTo(shoe2X-5+i*4,shoe2Y-4);ctx.lineTo(shoe2X-2+i*4,shoe2Y+1);ctx.stroke();
 }

 // White soles
 ctx.fillStyle="#ffffff";
 ctx.beginPath();ctx.ellipse(shoe1X+1,shoe1Y+5,15,2.7,-.08,0,7);ctx.fill();
 ctx.beginPath();ctx.ellipse(shoe2X+1,shoe2Y+5,15,2.7,-.08,0,7);ctx.fill();

 // Small gold buckles
 ctx.fillStyle="#ffd91a";
 ctx.fillRect(shoe1X-2,shoe1Y-4,4,3);
 ctx.fillRect(shoe2X-2,shoe2Y-4,4,3);
 ctx.restore();

 if(player.super){
   ctx.strokeStyle="rgba(255,245,70,.72)";ctx.lineWidth=3;
   for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x+24,y+30,35+i*8,0,7);ctx.stroke()}
 }
}

function drawEnemy(e){
 if(!e.alive)return;
 const x=e.x-camera,y=e.y;
 ctx.save();
 ctx.shadowColor=e.type>=2?"#37e7ff":"#ff4a3d";ctx.shadowBlur=14;

 // legs
 ctx.strokeStyle="#aab5bf";ctx.lineWidth=6;
 ctx.beginPath();ctx.moveTo(x+15,y+31);ctx.lineTo(x+10,y+44);ctx.moveTo(x+37,y+31);ctx.lineTo(x+42,y+44);ctx.stroke();
 ctx.fillStyle="#232b34";
 ctx.beginPath();ctx.roundRect(x+1,y+40,20,8,4);ctx.fill();
 ctx.beginPath();ctx.roundRect(x+31,y+40,20,8,4);ctx.fill();

 const metal=ctx.createLinearGradient(x,y,x+e.w,y+e.h);
 if(e.type>=2){
   metal.addColorStop(0,"#dffcff");metal.addColorStop(.28,"#2de7ff");metal.addColorStop(.7,"#1b4d70");metal.addColorStop(1,"#101822");
 }else{
   metal.addColorStop(0,"#e8eef4");metal.addColorStop(.25,"#ff675c");metal.addColorStop(.7,"#9f1720");metal.addColorStop(1,"#242b34");
 }
 ctx.fillStyle=metal;ctx.beginPath();ctx.roundRect(x+4,y+8,e.w-8,e.h-13,11);ctx.fill();

 // chest core
 ctx.fillStyle=e.type>=2?"#ff3df2":"#ffe344";
 ctx.beginPath();ctx.arc(x+26,y+24,7,0,7);ctx.fill();

 // head
 ctx.fillStyle="#222a33";ctx.beginPath();ctx.arc(x+26,y+8,14,Math.PI,0);ctx.fill();
 ctx.fillStyle=e.type>=2?"#37e7ff":"#ffe344";ctx.beginPath();ctx.roundRect(x+13,y+5,26,12,6);ctx.fill();

 // eyes
 ctx.fillStyle="#101820";
 ctx.beginPath();ctx.moveTo(x+17,y+9);ctx.lineTo(x+24,y+11);ctx.lineTo(x+17,y+13);ctx.closePath();ctx.fill();
 ctx.beginPath();ctx.moveTo(x+35,y+9);ctx.lineTo(x+28,y+11);ctx.lineTo(x+35,y+13);ctx.closePath();ctx.fill();

 // antenna and claws
 ctx.strokeStyle="#b7c1ca";ctx.lineWidth=3;
 ctx.beginPath();ctx.moveTo(x+26,y+1);ctx.lineTo(x+26,y-9);ctx.stroke();
 ctx.fillStyle=e.type>=2?"#ff3df2":"#ff3030";ctx.beginPath();ctx.arc(x+26,y-11,4,0,7);ctx.fill();

 ctx.strokeStyle="#aeb8c2";ctx.lineWidth=5;
 ctx.beginPath();ctx.moveTo(x+4,y+20);ctx.lineTo(x-7,y+28);ctx.moveTo(x+48,y+20);ctx.lineTo(x+59,y+28);ctx.stroke();
 ctx.restore();
}

function drawBoss(){
 if(!boss.active||!boss.alive)return;
 const x=boss.x-camera,y=boss.y;
 ctx.save();ctx.shadowColor="#ff3df2";ctx.shadowBlur=22;

 const g=ctx.createLinearGradient(x,y,x,y+boss.h);
 g.addColorStop(0,"#8795a8");g.addColorStop(.35,"#3a4352");g.addColorStop(1,"#10151e");
 ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,boss.w,boss.h,24);ctx.fill();

 ctx.fillStyle="#1a2030";ctx.beginPath();ctx.roundRect(x+22,y+20,boss.w-44,boss.h-40,18);ctx.fill();
 ctx.fillStyle="#ff3df2";ctx.beginPath();ctx.arc(x+boss.w/2,y+62,36,0,7);ctx.fill();
 ctx.fillStyle="#37e7ff";ctx.beginPath();ctx.arc(x+boss.w/2,y+62,22,0,7);ctx.fill();
 ctx.fillStyle="#111";ctx.fillRect(x+78,y+54,12,12);ctx.fillRect(x+120,y+54,12,12);

 // shoulder cannons
 ctx.fillStyle="#606c7d";
 ctx.fillRect(x-25,y+38,35,70);ctx.fillRect(x+boss.w-10,y+38,35,70);
 ctx.fillStyle="#ff3df2";
 ctx.fillRect(x-23,y+44,30,8);ctx.fillRect(x+boss.w-7,y+44,30,8);

 ctx.fillStyle="#fff";ctx.fillRect(x,y-26,boss.w,14);
 ctx.fillStyle="#ff3434";ctx.fillRect(x,y-26,boss.w*(boss.hp/boss.maxHp),14);
 ctx.restore();
}

function draw(){
 const sx=shake>0?(Math.random()-.5)*shake:0,sy=shake>0?(Math.random()-.5)*shake:0;
 ctx.save();ctx.translate(sx,sy);

 if(currentLevel===1)drawTropicalBackground();else if(currentLevel===2)drawCityBackground();else drawFortressBackground();
 platforms.forEach(drawPlatform);

 const t=performance.now();
 ringItems.forEach(r=>{
   if(r.got)return;
   const x=r.x-camera,y=r.y+Math.sin(t*.004+r.p)*5;
   ctx.save();ctx.shadowColor="#ffd21e";ctx.shadowBlur=13;
   ctx.strokeStyle="#ffd21e";ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(x,y,10,15,0,0,7);ctx.stroke();
   ctx.restore();
 });

 emeralds.forEach(e=>{if(!e.got)drawGem(e.x-camera,e.y,e.color,1)});
 enemies.forEach(drawEnemy);
 drawBoss();

 shots.forEach(s=>{
   ctx.save();ctx.shadowColor="#ff472e";ctx.shadowBlur=15;
   ctx.fillStyle="#ff472e";ctx.beginPath();ctx.arc(s.x-camera,s.y,12,0,7);ctx.fill();
   ctx.fillStyle="#ffd64a";ctx.beginPath();ctx.arc(s.x-camera,s.y,5,0,7);ctx.fill();
   ctx.restore();
 });

 particles.forEach(p=>{
   ctx.globalAlpha=Math.max(0,p.life/55);ctx.fillStyle=p.color;
   ctx.beginPath();ctx.arc(p.x-camera,p.y,p.size,0,7);ctx.fill();ctx.globalAlpha=1;
 });

 drawPlayer();
 ctx.restore();

 if(flash>0){
   ctx.fillStyle=`rgba(255,255,255,${flash/40})`;
   ctx.fillRect(0,0,canvas.width,canvas.height);
 }
}

function loop(){
 if(!running)return;
 update();draw();requestAnimationFrame(loop);
}

buildLevel(1);
draw();
})();
</script>
